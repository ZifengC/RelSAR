batch_size: 1024
dropout: 0.1
lr: 0.002
min_lr: 0.000001  
l2: 0.00003

epoch: 100
patience: 3
early_stop: 20

num_layers: 1
num_heads: 2

q_i_cl_temp: 0.5 
q_i_cl_weight: 0.001

his_cl_temp: 0.1
his_cl_weight: 0.1

pred_hid_units: [200, 80, 1]

intent_temp: 0.5
intent_history_decay: 0.9
intent_var_min: 0.0001
intent_update_sharpen: 2.0
rec_cross_alpha: 0.05
explore_temp_scale: 2.0
exploit_temp_scale: 1.5
transformer_temp_min: 0.7
transformer_temp_max: 1.5
cf_gate_scale: 10.0
cf_consistency_weight: 0.01
cf_sparsity_weight: 0.0001
path_competition_weight: 0.0
intent_assignment_weight: 0.01
intent_entropy_target: 0.5
intent_confidence_target: 0.55

src_loss_weight: 0.1 # weight for the loss of search
